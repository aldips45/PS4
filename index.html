<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PS4/5 Exploit</title>
<meta name="description" content="Modernized interface for PS4/5 exploit demo (UI only). Uses Service Worker for offline caching.">


<!-- Google Font -->
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Roboto+Mono&display=swap" rel="stylesheet">


<style>
:root{
--bg:#0f1724; /* deep navy */
--card:#0b1220;
--muted:#9aa4b2;
--accent:#7c3aed;
--glass: rgba(255,255,255,0.04);
--radius:14px;
color-scheme: dark;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
body{background:linear-gradient(180deg,var(--bg),#060710);display:flex;align-items:center;justify-content:center;padding:24px;color:#e6eef8}


.app{
width:100%;max-width:980px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:18px;padding:28px;box-shadow:0 10px 30px rgba(2,6,23,0.6);backdrop-filter: blur(6px);
}


header{display:flex;gap:18px;align-items:center}
.logo{width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#3b82f6);display:grid;place-items:center;font-weight:900;font-family:Roboto Mono;color:white}
h1{font-size:20px;margin:0}
p.lead{margin:4px 0 0;color:var(--muted);font-size:13px}


.grid{display:grid;grid-template-columns:1fr 360px;gap:20px;margin-top:22px}


.card{background:var(--card);padding:18px;border-radius:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.02)}


#console{height:320px;overflow:auto;background:var(--glass);padding:14px;border-radius:10px;font-family:Roboto Mono,monospace;font-size:13px;color:#bfe0ff;white-space:pre-wrap}


.controls{display:flex;gap:10px;align-items:center}
button{background:linear-gradient(180deg,var(--accent),#5b21b6);border:0;color:white;padding:10px 14px;border-radius:10px;font-weight:600;cursor:pointer}
button.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
.muted{color:var(--muted);font-size:13px}


.sidebar .info{font-size:13px;color:var(--muted);margin-bottom:12px}
a{color:inherit}


</html>
